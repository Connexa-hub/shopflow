[project]
name = "shopflow-configuration"
version = "0.1.0"
description = "Shared environment configuration and validation for ShopFlow services"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["shopflow_configuration*"]
