version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: shopflow_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    env_file:
      - services/auth-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/shopflow_auth
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    restart: unless-stopped
    env_file:
      - services/inventory-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/shopflow_inventory
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sales-service:
    build:
      context: .
      dockerfile: services/sales-service/Dockerfile
    restart: unless-stopped
    env_file:
      - services/sales-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/shopflow_sales
      REDIS_URL: redis://redis:6379/0
      INVENTORY_SERVICE_URL: http://inventory-service:8000
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inventory-service:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    restart: unless-stopped
    env_file:
      - services/payment-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/shopflow_payment
      REDIS_URL: redis://redis:6379/0
      PUBLIC_BASE_URL: http://localhost:8004
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
